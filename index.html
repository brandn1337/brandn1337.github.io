	<!-- This divider is where the Menu buttons are. Check the Css ".Menu" for its style   -->
	<div class="Menu">
	    <!-- these Buttons are what swich to each divider. They all call the Menu change function that switches based off what Num they send -->
		<button class="MenuButton"  onclick="MenuChange(1)"> Workshop </button>
		<button class="MenuButton"  onclick="MenuChange(2)"> World </button>
		<button class="MenuButton"  onclick="MenuChange(3)"> Inventory </button>
		<button class="MenuButton"  onclick="MenuChange(4)"> Quests </button>

	<div class="WorkshopPage" id="WS">

	</div>


	<div class="WorldPage" id="W">

			<h1 style="color: white;"> Local Cavern</h1>

		</div>

		
	</div>

		</div>
